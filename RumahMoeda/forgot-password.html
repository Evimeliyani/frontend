<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - RumahMoeda</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <a href="login.html" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
            <h2>Lupa Password?</h2>
            <p>Masukkan email terdaftar Anda untuk menerima tautan pemulihan kata sandi</p>
        </div>

        <form id="forgotForm" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Alamat Email</label>
                <input type="email" id="email" required placeholder="Masukkan email Anda">
            </div>
            <button type="submit" class="btn-auth">Kirim Tautan Pemulihan</button>
        </form>

        <div class="auth-footer">
            <p>Ingat password Anda? <a href="login.html" class="auth-link">Login kembali</a></p>
        </div>
    </div>

    <script src="js/darkmode.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Tautan instruksi reset password telah dikirim ke email Anda jika terdaftar.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
